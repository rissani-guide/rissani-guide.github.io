<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RISSANI GUIDE: MOHAMMED NACEUR</title>

  <style>
    /* =====================
       THEME VARIABLES
       ===================== */
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #333333;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.08);
      --overlay: rgba(0, 0, 0, 0.85);
    }

    body.dark {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #e5e5e5;
      --border: #2a2a2a;
      --shadow: rgba(0, 0, 0, 0.4);
      --overlay: rgba(0, 0, 0, 0.9);
    }

    /* =====================
       BASE STYLES
       ===================== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    header {
      padding: 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    header p {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .header-text {
      text-align: left;
    }

    /* =====================
       THEME TOGGLE
       ===================== */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
    }

    .theme-toggle input {
      display: none;
    }

    .toggle {
      width: 44px;
      height: 24px;
      background: var(--border);
      border-radius: 999px;
      position: relative;
      transition: background 0.25s ease;
    }

    .toggle::after {
      content: "";
      width: 18px;
      height: 18px;
      background: var(--surface);
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.25s ease;
      box-shadow: 0 2px 4px var(--shadow);
    }

    input:checked + .toggle::after {
      transform: translateX(20px);
    }

    /* =====================
       CONTENT
       ===================== */
    main {
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .card:active {
      transform: scale(0.98);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .label {
      padding: 0.75rem;
      text-align: center;
      font-weight: 600;
    }

    /* =====================
       ZOOM OVERLAY
       ===================== */
    .zoom-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .zoom-overlay.active {
      display: flex;
    }

    .zoom-overlay img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 6px;
    }

    /* =====================
       RESPONSIVE
       ===================== */
    @media (min-width: 768px) {
      main {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>RISSANI GUIDE: MOHAMMED NACEUR</h1>
    <p>References & testimonials</p>
  </div>

  <label class="theme-toggle">
    <input type="checkbox" id="themeSwitch">
    <span class="toggle"></span>
  </label>
</header>

<main>
  <div id="testimonials-book" class="card" data-img="testimonials-book.jpg">
    <img src="testimonials-book.jpg" alt="testimonials in a a very known book" />
    <div class="label">Book testimonial</div>
  </div>
</main>

<div class="zoom-overlay" id="zoomOverlay">
  <img src="" alt="Zoomed image" />
</div>

<script>
  /* =====================
     THEME LOGIC
     ===================== */
  const themeSwitch = document.getElementById('themeSwitch');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const savedTheme = localStorage.getItem('theme');

  if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
    document.body.classList.add('dark');
    themeSwitch.checked = true;
  }

  themeSwitch.addEventListener('change', () => {
    document.body.classList.toggle('dark', themeSwitch.checked);
    localStorage.setItem('theme', themeSwitch.checked ? 'dark' : 'light');
  });

  /* =====================
     ZOOM LOGIC
     ===================== */
  const overlay = document.getElementById('zoomOverlay');
  const overlayImg = overlay.querySelector('img');

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      overlayImg.src = card.dataset.img;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });

  overlay.addEventListener('click', () => {
    overlay.classList.remove('active');
    overlayImg.src = '';
    document.body.style.overflow = '';
  });
</script>

</body>
</html>
